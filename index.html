<style>
body{
  font-family:sans-serif;
  max-width:800px;
  margin:auto;
  padding:20px;
}

textarea{
  width:100%;
  height:220px;

}

button{
  padding:12px;
  margin-top:10px;

<body>

<h2>คัดลอกสคิปเพื่อไปวางทำเสียงAIหรือแก้คำตามต้องการ</h2>

<textarea id="text"></textarea>
<script>
const templates = {
  outage: `ประกาศ...

ขอดับไฟฟ้าชั่วคราว

บริเวณ บ้านบ่อ ถึง ชุมพร

ในวันที่ 20 เมษายน 2569

ตั้งแต่เวลา แปดโมงครึ่งเช้า ถึง ห้าโมงเย็น

เพื่อปรับปรุงระบบจำหน่ายไฟฟ้า

การไฟฟ้าส่วนภูมิภาค จังหวัดประจวบ

ขออภัยในความไม่สะดวก`,

  restore: `https://www.minimax.io/audio/text-to-speech`,

  emergency: `ประกาศจากการไฟฟ้าส่วนภูมิภาค
ขณะนี้เกิดเหตุขัดข้องในพื้นที่ ..................
เจ้าหน้าที่กำลังเร่งแก้ไข
ขออภัยในความไม่สะดวก`,

  custom: `พิมพ์ข้อความประกาศของคุณที่นี่...`
};

const url = new URL(window.location.href);
const mode = url.searchParams.get("mode") || "outage";
document.getElementById("text").value = templates[mode] || templates.outage;

// ฟังก์ชันเดิมของคุณ (ถ้ามีแล้วให้คงไว้)
function copyText(){
  navigator.clipboard.writeText(document.getElementById("text").value);
  alert("คัดลอกข้อความแล้ว");
}
function openTTS(){
  window.open("https://www.minimax.io/audio/text-to-speech");
}
</script>
